apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-video
  namespace: streaming-slice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: video-server
  template:
    metadata:
      labels:
        app: video-server
    spec:
      containers:
      - name: nginx-container
        image: nginx
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-service
  namespace: streaming-slice
spec:
  type: NodePort
  selector:
    app: video-server
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 80

