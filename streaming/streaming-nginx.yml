apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-video
  namespace: streaming-slice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: video-server
  template:
    metadata:
      labels:
        app: video-server
    spec:
      containers:
      - name: nginx-container
        image: mcs2503/custom-nginx-rtmp:latest
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        ports:
        - containerPort: 1935
          name: rtmp
        - containerPort: 80
          name: http
        volumeMounts:
        - name: hls-storage
          mountPath: /tmp/hls
      volumes:
      - name: hls-storage
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-service
  namespace: streaming-slice
spec:
  type: NodePort
  selector:
    app: video-server
  ports:
  - name: http
    protocol: TCP
    port: 8080
    targetPort: 80
  - name: rtmp
    protocol: TCP
    port: 1935
    targetPort: 1935
