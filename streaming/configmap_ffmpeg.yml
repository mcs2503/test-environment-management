apiVersion: v1
kind: ConfigMap
metadata:
  name: ffmpeg-config
  namespace: iot-simulators
data:
  RESOLUTION: "960:540"
  PRESET: "ultrafast"
  TUNE: "zerolatency"
  BITRATE: "2000k"
  MAXBITRATE: "3000k"
  BUFFER_SIZE: "4000k"
  BITRATE_AUDIO: "128k"
#  RTMP_SERVER: "rtmp://nginx-service.streaming-slice.svc.cluster.local:1935/live/stream1"
