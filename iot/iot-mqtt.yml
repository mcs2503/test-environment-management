apiVersion: v1
kind: ConfigMap
metadata:
  name: mosquitto-config
  namespace: iot-slice
data:
  mosquitto.conf: |
    persistence true
    persistence_location /mosquitto/data/
    log_dest stdout
    listener 1883 0.0.0.0
    allow_anonymous true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mqtt-iot
  namespace: iot-slice
spec:
  replicas: 2
  selector:
    matchLabels:
      app: iot-broker
  template:
    metadata:
      labels:
        app: iot-broker
    spec:
      containers:
      - name: mqtt-broker
        image: eclipse-mosquitto
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        volumeMounts:
        - name: mqtt-config
          mountPath: /mosquitto/config/mosquitto.conf
          subPath: mosquitto.conf
      volumes:
      - name: mqtt-config
        configMap:
          name: mosquitto-config
---
apiVersion: v1
kind: Service
metadata:
  name: mqtt-service
  namespace: iot-slice
spec:
  type: NodePort
  selector:
    app: iot-broker
  ports:
  - protocol: TCP
    port: 1883
    targetPort: 1883
